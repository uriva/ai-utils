name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check
        run: deno task check

  test:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        stage:
          - name: core
            provider: ""
          - name: google
            provider: google
          - name: moonshot
            provider: moonshot
          - name: anthropic
            provider: anthropic
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RMMBR_TOKEN: ${{ secrets.RMMBR_TOKEN }}
      TEST_PROVIDER: ${{ matrix.stage.provider }}
    name: test (${{ matrix.stage.name }})
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Test
        run: |
          if [ -z "$TEST_PROVIDER" ]; then
            deno test -A \
              tests/compaction.test.ts \
              tests/output_sanitization.test.ts \
              tests/pure_logic.test.ts \
              tests/thought_duplication.test.ts \
              tests/thought_signature.test.ts \
              tests/token_cap.test.ts
          else
            deno test -A \
              tests/agent_tools.test.ts \
              tests/multiple_tool_calls_history.test.ts \
              tests/thinking.test.ts \
              --filter "\[$TEST_PROVIDER\]"
          fi
